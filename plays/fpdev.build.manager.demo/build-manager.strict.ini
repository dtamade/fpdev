# 严格模式产物清单（最佳实践模板）
# 本文件位于 demo 目录，严格模式会自动优先搜索此路径（已实现多路径搜索）
# 你也可以将它复制到项目根目录或使用 SetStrictConfigPath(...) 指定自定义路径
# 说明：所有相对路径均以 sandbox/fpc-<version> 为根

[bin]
# 编译器/编译器前端应当存在
required_prefix=fpc,ppc
required_ext=.exe,.sh,
min_count=1

[lib]
# 通常会存在 fpc/<version> 等子目录
require_subdir=true
min_count=1
# 如需更严格：取消下一行注释，检查特定子目录名
; required_subdir=fpc

[share]
# 缺省不强制，如文档/示例安装到 share 可开启
required=false
min_count=0
require_subdir=false
; required_subdir=fpcdoc

[fpc]
# 多数情况下要求有 fpc.cfg，可按布局调整候选列表
require_cfg=true
cfg_relative_list=etc/fpc.cfg,lib/fpc/fpc.cfg

[include]
# 头文件目录（如有需要）
relative_dir=include
required=false
min_count=0
require_subdir=false
; required_subdir=rtl

[doc]
# 文档目录（如有需要）
relative_dir=doc
required=false
min_count=0
require_subdir=false
; required_subdir=html

