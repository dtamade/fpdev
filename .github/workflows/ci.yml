name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  release-acceptance-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FPC and Lazarus
      run: |
        sudo apt-get update
        sudo apt-get install -y fpc lazarus libgit2-dev

    - name: Show FPC version
      run: fpc -iV

    - name: Run repository quality analyzer
      run: python3 scripts/analyze_code_quality.py .

    - name: Run release contract unit tests
      run: |
        python3 -m unittest \
          tests.test_archive_docs_contract \
          tests.test_fusion_task_analysis_contract \
          tests.test_fusion_status_artifacts_contract \
          tests.test_fusion_code_review_report_contract \
          tests.test_fusion_audit_report_contract \
          tests.test_contributor_docs_contract \
          tests.test_official_docs_cli_contract \
          tests.test_build_manager_callback_contract \
          tests.test_lazarus_callback_contract \
          tests.test_release_docs_contract \
          tests.test_release_scripts_contract \
          tests.test_package_release_assets \
          tests.test_generate_release_checksums \
          tests.test_generate_release_evidence \
          tests.test_record_owner_smoke_sh \
          tests.test_release_status_wording \
          tests.test_ci_workflow_contract \
          tests.test_ci_release_contracts

    - name: Run Linux release acceptance lane
      run: bash scripts/release_acceptance_linux.sh

    - name: Package Linux release asset
      run: |
        rm -rf release-assets
        python3 scripts/package_release_assets.py \
          --output-dir release-assets \
          --data-dir src/data \
          --linux-bin bin/fpdev

    - name: Upload Linux release asset
      uses: actions/upload-artifact@v4
      with:
        name: release-asset-linux-x64
        path: release-assets/fpdev-linux-x64.tar.gz
        retention-days: 7

    - name: Upload release acceptance logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: release-acceptance-logs
        path: logs/release_acceptance/
        retention-days: 7

  compile-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FPC and Lazarus
      run: |
        sudo apt-get update
        sudo apt-get install -y fpc lazarus libgit2-dev

    - name: Check for warnings and hints
      run: |
        lazbuild -B fpdev.lpi 2>&1 | tee build.log

        # Check for compilation warnings in source files
        if grep -E "^(/|\./).*src/.*Warning:" build.log; then
          echo "::error::Compilation warnings found in src/"
          exit 1
        fi
        echo "No warnings in src/."

        # Check for compilation hints in source files (target: 0 source hints)
        # System hints (11030/11031 config file read) are excluded
        SOURCE_HINTS=$(grep -E "^(/|\./).*src/.*Hint: \(50" build.log || true)
        if [ -n "${SOURCE_HINTS}" ]; then
          echo "${SOURCE_HINTS}"
          echo "::error::Compilation hints found in src/ (target is zero hints)"
          exit 1
        fi
        echo "No source-code hints in src/."

    - name: Upload compile log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: compile-check-log
        path: build.log
        retention-days: 7

  cross-platform-cli-smoke:
    name: Cross-platform CLI smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            lane: windows-x64
            install_step: choco install freepascal --no-progress -y
            build_flags: -B -O3 -CX -XX
            python_cmd: python
            package_arg: --windows-bin bin/fpdev.exe
            asset_file: fpdev-windows-x64.zip
            artifact_name: release-asset-windows-x64
          - os: macos-15-intel
            lane: macos-x64
            install_step: brew install fpc libgit2
            build_flags: -B -O3 -CX -XX -Xs
            python_cmd: python3
            package_arg: --macos-x64-bin bin/fpdev
            asset_file: fpdev-macos-x64.tar.gz
            artifact_name: release-asset-macos-x64
          - os: macos-15
            lane: macos-arm64
            install_step: brew install fpc libgit2
            build_flags: -B -O3 -CX -XX -Xs
            python_cmd: python3
            package_arg: --macos-arm64-bin bin/fpdev
            asset_file: fpdev-macos-arm64.tar.gz
            artifact_name: release-asset-macos-arm64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Install FPC toolchain
      run: ${{ matrix.install_step }}

    - name: Export Windows x64 FPC path
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $FpcExe = Get-ChildItem 'C:\tools\freepascal\bin' -Recurse -Filter fpc.exe -ErrorAction Stop |
          Where-Object { $_.FullName -match '[\\/]x86_64-win64[\\/]' } |
          Select-Object -First 1
        if ($null -eq $FpcExe) {
          $KnownBins = Get-ChildItem 'C:\tools\freepascal\bin' -Recurse -Filter fpc.exe -ErrorAction SilentlyContinue |
            ForEach-Object { $_.FullName }
          throw "x64 fpc.exe not found under C:\tools\freepascal\bin. Found: $($KnownBins -join '; ')"
        }
        "FPC_EXE=$($FpcExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        $FpcExe.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Export macOS libgit2 paths
      if: runner.os == 'macOS'
      shell: bash
      run: |
        LIBGIT2_PREFIX="$(brew --prefix libgit2)"
        {
          echo "LIBRARY_PATH=${LIBGIT2_PREFIX}/lib:${LIBRARY_PATH:-}"
          echo "DYLD_LIBRARY_PATH=${LIBGIT2_PREFIX}/lib:${DYLD_LIBRARY_PATH:-}"
          echo "FPC_LIBGIT2_FLAGS=-Fl${LIBGIT2_PREFIX}/lib"
        } >> "$GITHUB_ENV"

    - name: Show FPC version
      if: runner.os != 'Windows'
      shell: bash
      run: fpc -iV

    - name: Show FPC version on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        & $env:FPC_EXE -iV

    - name: Build CLI smoke binary
      if: runner.os != 'Windows'
      shell: bash
      run: |
        rm -rf bin lib
        mkdir -p bin lib
        fpc ${{ matrix.build_flags }} ${FPC_LIBGIT2_FLAGS:-} -Fusrc -Fisrc -FEbin -FUlib src/fpdev.lpr

    - name: Build CLI smoke binary on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (Test-Path bin) { Remove-Item bin -Recurse -Force }
        if (Test-Path lib) { Remove-Item lib -Recurse -Force }
        New-Item -ItemType Directory -Force -Path bin, lib | Out-Null
        & $env:FPC_EXE ${{ matrix.build_flags }} -Fusrc -Fisrc -FEbin -FUlib src/fpdev.lpr

    - name: Run CLI smoke commands
      if: runner.os != 'Windows'
      shell: bash
      run: bash scripts/cli_smoke.sh ./bin/fpdev

    - name: Run CLI smoke commands on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: ./scripts/cli_smoke.ps1 -ExecutablePath .\bin\fpdev.exe

    - name: Record owner smoke transcript
      if: always() && runner.os != 'Windows' && hashFiles('bin/fpdev') != ''
      shell: bash
      run: bash scripts/record_owner_smoke.sh ${{ matrix.lane }} ./bin/fpdev owner-proof

    - name: Record owner smoke transcript on Windows
      if: always() && runner.os == 'Windows' && hashFiles('bin/fpdev.exe') != ''
      shell: pwsh
      run: ./scripts/record_owner_smoke.ps1 -Lane ${{ matrix.lane }} -ExecutablePath .\bin\fpdev.exe -OutputDir owner-proof

    - name: Package release asset
      shell: bash
      run: |
        rm -rf release-assets
        ${{ matrix.python_cmd }} scripts/package_release_assets.py \
          --output-dir release-assets \
          --data-dir src/data \
          ${{ matrix.package_arg }}

    - name: Upload packaged release asset
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: release-assets/${{ matrix.asset_file }}
        retention-days: 7

    - name: Upload owner proof artifact
      if: always() && hashFiles('owner-proof/**') != ''
      uses: actions/upload-artifact@v4
      with:
        name: owner-proof-${{ matrix.lane }}
        path: owner-proof/
        retention-days: 7

  assemble-release-ready-bundle:
    name: Assemble release-ready bundle
    needs:
      - compile-check
      - release-acceptance-linux
      - cross-platform-cli-smoke
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Linux release asset
      uses: actions/download-artifact@v4
      with:
        name: release-asset-linux-x64
        path: bundle/downloads/release-asset-linux-x64

    - name: Download Windows release asset
      uses: actions/download-artifact@v4
      with:
        name: release-asset-windows-x64
        path: bundle/downloads/release-asset-windows-x64

    - name: Download macOS x64 release asset
      uses: actions/download-artifact@v4
      with:
        name: release-asset-macos-x64
        path: bundle/downloads/release-asset-macos-x64

    - name: Download macOS arm64 release asset
      uses: actions/download-artifact@v4
      with:
        name: release-asset-macos-arm64
        path: bundle/downloads/release-asset-macos-arm64

    - name: Download release acceptance logs
      uses: actions/download-artifact@v4
      with:
        name: release-acceptance-logs
        path: bundle/downloads/release-acceptance-logs

    - name: Download Windows owner proof
      uses: actions/download-artifact@v4
      with:
        name: owner-proof-windows-x64
        path: bundle/downloads/owner-proof-windows-x64

    - name: Download macOS x64 owner proof
      uses: actions/download-artifact@v4
      with:
        name: owner-proof-macos-x64
        path: bundle/downloads/owner-proof-macos-x64

    - name: Download macOS arm64 owner proof
      uses: actions/download-artifact@v4
      with:
        name: owner-proof-macos-arm64
        path: bundle/downloads/owner-proof-macos-arm64

    - name: Assemble release-ready bundle
      shell: bash
      run: |
        rm -rf release-ready-bundle
        mkdir -p release-ready-bundle/release-assets release-ready-bundle/owner-proof release-ready-bundle/release-acceptance-logs
        cp bundle/downloads/release-asset-linux-x64/fpdev-linux-x64.tar.gz release-ready-bundle/release-assets/
        cp bundle/downloads/release-asset-windows-x64/fpdev-windows-x64.zip release-ready-bundle/release-assets/
        cp bundle/downloads/release-asset-macos-x64/fpdev-macos-x64.tar.gz release-ready-bundle/release-assets/
        cp bundle/downloads/release-asset-macos-arm64/fpdev-macos-arm64.tar.gz release-ready-bundle/release-assets/
        cp -R bundle/downloads/release-acceptance-logs/. release-ready-bundle/release-acceptance-logs/
        cp -R bundle/downloads/owner-proof-windows-x64/. release-ready-bundle/owner-proof/
        cp -R bundle/downloads/owner-proof-macos-x64/. release-ready-bundle/owner-proof/
        cp -R bundle/downloads/owner-proof-macos-arm64/. release-ready-bundle/owner-proof/

    - name: Generate release checksums
      shell: bash
      run: python3 scripts/generate_release_checksums.py release-ready-bundle/release-assets --require-planned-assets

    - name: Generate release evidence
      shell: bash
      run: |
        BASELINE_SUMMARY="$(find release-ready-bundle/release-acceptance-logs -name summary.txt -print | while read -r path; do grep -q '^with_install: 0$' \"$path\" && printf '%s\n' \"$path\" && break; done)"
        INSTALL_SUMMARY="$(find release-ready-bundle/release-acceptance-logs -name summary.txt -print | while read -r path; do grep -q '^with_install: 1$' \"$path\" && printf '%s\n' \"$path\" && break; done)"
        if [[ -z "${BASELINE_SUMMARY}" ]]; then
          echo "::error::Missing baseline summary in release acceptance logs"
          exit 1
        fi
        args=(
          --baseline-summary "${BASELINE_SUMMARY}"
          --asset-dir release-ready-bundle/release-assets
          --owner-proof-dir release-ready-bundle/owner-proof
          --output release-ready-bundle/release-assets/RELEASE_EVIDENCE.md
        )
        if [[ -n "${INSTALL_SUMMARY}" ]]; then
          args+=(--install-summary "${INSTALL_SUMMARY}")
        fi
        python3 scripts/generate_release_evidence.py "${args[@]}"

    - name: Upload release-ready bundle
      uses: actions/upload-artifact@v4
      with:
        name: release-ready-bundle
        path: release-ready-bundle/
        retention-days: 7
