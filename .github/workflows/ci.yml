name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FPC and Lazarus
      run: |
        sudo apt-get update
        sudo apt-get install -y fpc lazarus

    - name: Show FPC version
      run: fpc -iV

    - name: Build main project
      run: lazbuild -B fpdev.lpi

    - name: Run tests
      run: bash scripts/run_all_tests.sh

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: logs/
        retention-days: 7

  compile-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FPC and Lazarus
      run: |
        sudo apt-get update
        sudo apt-get install -y fpc lazarus

    - name: Check for warnings/hints
      run: |
        lazbuild -B fpdev.lpi 2>&1 | tee build.log
        if grep -E "^(src/|\.\/src/).*Warning:" build.log; then
          echo "::error::Compilation warnings found in src/"
          exit 1
        fi
        echo "No warnings in src/"
