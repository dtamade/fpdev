name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  release-acceptance-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FPC and Lazarus
      run: |
        sudo apt-get update
        sudo apt-get install -y fpc lazarus libgit2-dev

    - name: Show FPC version
      run: fpc -iV

    - name: Run repository quality analyzer
      run: python3 scripts/analyze_code_quality.py .

    - name: Run release contract unit tests
      run: |
        python3 -m unittest \
          tests.test_contributor_docs_contract \
          tests.test_official_docs_cli_contract \
          tests.test_release_docs_contract \
          tests.test_release_scripts_contract \
          tests.test_package_release_assets \
          tests.test_generate_release_checksums \
          tests.test_generate_release_evidence \
          tests.test_record_owner_smoke_sh \
          tests.test_release_status_wording \
          tests.test_ci_workflow_contract \
          tests.test_ci_release_contracts

    - name: Run Linux release acceptance lane
      run: bash scripts/release_acceptance_linux.sh

    - name: Package Linux release asset
      run: |
        rm -rf release-assets
        python3 scripts/package_release_assets.py \
          --output-dir release-assets \
          --data-dir src/data \
          --linux-bin bin/fpdev

    - name: Upload Linux release asset
      uses: actions/upload-artifact@v4
      with:
        name: release-asset-linux-x64
        path: release-assets/fpdev-linux-x64.tar.gz
        retention-days: 7

    - name: Upload release acceptance logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: release-acceptance-logs
        path: logs/release_acceptance/
        retention-days: 7

  compile-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FPC and Lazarus
      run: |
        sudo apt-get update
        sudo apt-get install -y fpc lazarus libgit2-dev

    - name: Check for warnings and hints
      run: |
        set -o pipefail
        lazbuild -B fpdev.lpi 2>&1 | tee build.log

        # Check for compilation warnings in source files
        if grep -E "^(/|\./).*src/.*Warning:" build.log; then
          echo "::error::Compilation warnings found in src/"
          exit 1
        fi
        echo "No warnings in src/."

        # Check for compilation hints in source files (target: 0 source hints)
        # System hints (11030/11031 config file read) are excluded
        SOURCE_HINTS=$(grep -E "^(/|\./).*src/.*Hint: \(50" build.log || true)
        if [ -n "${SOURCE_HINTS}" ]; then
          echo "${SOURCE_HINTS}"
          echo "::error::Compilation hints found in src/ (target is zero hints)"
          exit 1
        fi
        echo "No source-code hints in src/."

    - name: Upload compile log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: compile-check-log
        path: build.log
        retention-days: 7

  cross-platform-cli-smoke:
    name: Cross-platform CLI smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            lane: windows-x64
            install_step: choco install freepascal --no-progress -y
            build_flags: -B -O3 -CX -XX -Twin64 -Px86_64
            python_cmd: python
            package_arg: --windows-bin bin/fpdev.exe
            asset_file: fpdev-windows-x64.zip
            artifact_name: release-asset-windows-x64
          - os: macos-15-intel
            lane: macos-x64
            install_step: brew install fpc libgit2
            build_flags: -B -O3 -CX -XX -Xs
            python_cmd: python3
            package_arg: --macos-x64-bin bin/fpdev
            asset_file: fpdev-macos-x64.tar.gz
            artifact_name: release-asset-macos-x64
          - os: macos-15
            lane: macos-arm64
            install_step: brew install fpc libgit2
            build_flags: -B -O3 -CX -XX -Xs
            python_cmd: python3
            package_arg: --macos-arm64-bin bin/fpdev
            asset_file: fpdev-macos-arm64.tar.gz
            artifact_name: release-asset-macos-arm64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FPC toolchain
      run: ${{ matrix.install_step }}

    - name: Add FPC to PATH on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $roots = @(
          'C:\tools\freepascal',
          'C:\tools',
          'C:\Program Files',
          'C:\ProgramData\chocolatey\lib',
          'C:\FPC'
        ) | Where-Object { Test-Path $_ }
        $backendPath = $null
        $backendName = $null
        $backendCandidates = @('ppcx64.exe', 'ppcrossx64.exe')
        foreach ($root in $roots) {
          foreach ($backendCandidate in $backendCandidates) {
            $candidate = Get-ChildItem -Path $root -Filter $backendCandidate -File -Recurse -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName -First 1
            if ($candidate) {
              $backendPath = $candidate
              $backendName = $backendCandidate
              break
            }
          }
          if ($backendPath) {
            break
          }
        }
        if (-not $backendPath) {
          throw 'Unable to locate ppcx64.exe or ppcrossx64.exe after Chocolatey installation.'
        }
        $backendDir = Split-Path -Parent $backendPath
        $fpcPath = Join-Path $backendDir 'fpc.exe'
        if (-not (Test-Path $fpcPath)) {
          $fpcPath = Get-ChildItem -Path $roots -Filter fpc.exe -File -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'i386-win32|x86_64-win64' } |
            Select-Object -ExpandProperty FullName -First 1
        }
        if (-not $fpcPath) {
          throw 'Unable to locate fpc.exe after Chocolatey installation.'
        }
        @(
          Split-Path -Parent $fpcPath
          $backendDir
        ) | Select-Object -Unique | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        "WINDOWS_FPC_BACKEND=$backendName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host "Added FPC frontend to PATH: $fpcPath"
        Write-Host "Added FPC backend to PATH: $backendPath"

    - name: Resolve libgit2 linker path on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        LIBGIT2_LIB_DIR="$(brew --prefix libgit2)/lib"
        echo "LIBGIT2_LIB_DIR=${LIBGIT2_LIB_DIR}" >> "$GITHUB_ENV"
        echo "Resolved libgit2 library directory: ${LIBGIT2_LIB_DIR}"

    - name: Show FPC version
      shell: bash
      run: fpc -iV

    - name: Verify Windows FPC toolchain
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        where.exe fpc
        where.exe $env:WINDOWS_FPC_BACKEND

    - name: Build CLI smoke binary
      shell: bash
      run: |
        rm -rf bin lib
        mkdir -p bin lib
        EXTRA_FLAGS=()
        COMPILER="fpc"
        BUILD_FLAGS="${{ matrix.build_flags }}"
        if [ "$RUNNER_OS" = "Windows" ] && [ -n "${WINDOWS_FPC_BACKEND:-}" ]; then
          COMPILER="${WINDOWS_FPC_BACKEND}"
          BUILD_FLAGS="${BUILD_FLAGS/-Px86_64/}"
        fi
        if [ -n "${LIBGIT2_LIB_DIR:-}" ]; then
          EXTRA_FLAGS+=("-Fl${LIBGIT2_LIB_DIR}" "-k-lgit2")
        fi
        $COMPILER $BUILD_FLAGS "${EXTRA_FLAGS[@]}" -Fusrc -Fisrc -FEbin -FUlib src/fpdev.lpr

    - name: Run CLI smoke commands
      if: runner.os != 'Windows'
      shell: bash
      run: bash scripts/cli_smoke.sh ./bin/fpdev

    - name: Run CLI smoke commands on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: ./scripts/cli_smoke.ps1 -ExecutablePath .\bin\fpdev.exe

    - name: Package release asset
      shell: bash
      run: |
        rm -rf release-assets
        ${{ matrix.python_cmd }} scripts/package_release_assets.py \
          --output-dir release-assets \
          --data-dir src/data \
          ${{ matrix.package_arg }}

    - name: Upload packaged release asset
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: release-assets/${{ matrix.asset_file }}
        retention-days: 7
